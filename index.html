<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Explore Free Books</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #333;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2em;
    }

    .search-container {
      margin: 20px 0;
    }

    input[type="text"] {
      padding: 10px;
      width: 300px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: 1px solid #0077cc;
      background-color: #0077cc;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005fa3;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 30px;
      padding: 20px;
    }

    .book {
      width: 200px;
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      text-align: center;
    }

    .book img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 4px;
    }

    .book-title {
      font-size: 1.2em;
      margin-top: 10px;
      color: #333;
    }

    .book-author {
      color: #777;
      font-size: 0.9em;
      margin-top: 5px;
    }

    .read-btn {
      display: inline-block;
      background-color: #0077cc;
      color: white;
      padding: 10px 20px;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .read-btn:hover {
      background-color: #005fa3;
    }

  </style>
</head>
<body>

  <header>
    <h1>Explore Free Books from Project Gutenberg, Open Library, & Google Books</h1>
    <p>Search for classic books with covers and read them for free!</p>
  </header>

  <div class="search-container">
    <input type="text" id="searchQuery" placeholder="Enter book title or author" />
    <button onclick="searchBooks()">Search</button>
  </div>

  <div class="container" id="bookResults"></div>

  <script>
    async function searchBooks() {
      const query = document.getElementById('searchQuery').value.trim();
      const resultsDiv = document.getElementById('bookResults');
      const encodedQuery = encodeURIComponent(query);

      if (!query) {
        resultsDiv.innerHTML = "<p>Please enter a search term.</p>";
        return;
      }

      resultsDiv.innerHTML = "<p>Loading books...</p>";

      // Clear previous results
      resultsDiv.innerHTML = '';

      try {
        // Fetch data from all APIs

        // 1. Project Gutenberg
        const gutenbergResponse = await fetch(`https://gutendex.com/books/?search=${encodedQuery}`);
        const gutenbergData = await gutenbergResponse.json();

        // 2. Open Library
        const openLibraryResponse = await fetch(`https://openlibrary.org/search.json?q=${encodedQuery}`);
        const openLibraryData = await openLibraryResponse.json();

        // 3. Google Books
        const googleBooksResponse = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodedQuery}`);
        const googleBooksData = await googleBooksResponse.json();

        // Combine results
        let books = [];

        // Add Project Gutenberg books
        if (gutenbergData.results) {
          gutenbergData.results.forEach(book => {
            books.push({
              title: book.title,
              author: book.authors ? book.authors.join(", ") : "Unknown Author",
              image: `https://www.gutenberg.org/cache/epub/${book.id}/pg${book.id}.cover.medium.jpg`,
              url: `https://www.gutenberg.org/ebooks/${book.id}`
            });
          });
        }

        // Add Open Library books
        if (openLibraryData.docs) {
          openLibraryData.docs.forEach(book => {
            books.push({
              title: book.title,
              author: book.author_name ? book.author_name.join(", ") : "Unknown Author",
              image: book.cover_i ? `https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg` : "https://via.placeholder.com/200x300?text=No+Cover",
              url: `https://openlibrary.org${book.key}`
            });
          });
        }

        // Add Google Books
        if (googleBooksData.items) {
          googleBooksData.items.forEach(book => {
            books.push({
              title: book.volumeInfo.title,
              author: book.volumeInfo.authors ? book.volumeInfo.authors.join(", ") : "Unknown Author",
              image: book.volumeInfo.imageLinks ? book.volumeInfo.imageLinks.thumbnail : "https://via.placeholder.com/200x300?text=No+Cover",
              url: book.volumeInfo.infoLink
            });
          });
        }

        // Display results
        if (books.length === 0) {
          resultsDiv.innerHTML = "<p>No books found. Try another search.</p>";
        } else {
          books.forEach(book => {
            const bookDiv = document.createElement('div');
            bookDiv.classList.add('book');
            
            bookDiv.innerHTML = `
              <img src="${book.image}" alt="${book.title}">
              <div class="book-title">${book.title}</div>
              <div class="book-author">${book.author}</div>
              <a href="${book.url}" class="read-btn" target="_blank">Read Now</a>
            `;
            
            resultsDiv.appendChild(bookDiv);
          });
        }

      } catch (error) {
        resultsDiv.innerHTML = "<p>Sorry, something went wrong. Please try again later.</p>";
      }
    }
  </script>

</body>
</html>
